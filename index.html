<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacBook Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.4s;
            padding: 1rem;
        }
        .unknown { background: #1a1a2e; color: #ccc; }
        .locked { background: #d4a017; color: #1a1a00; }
        .unlocked { background: #2ecc71; color: #003d1a; }
        .started { background: #3498db; color: #001a33; }

        .card {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 6rem; margin-bottom: 1rem; }
        .status { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; }
        .time { font-size: 1.1rem; opacity: 0.8; margin-bottom: 0.25rem; }
        .detail { font-size: 0.9rem; opacity: 0.6; }
        .live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #0f0; display: inline-block;
            margin-right: 4px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .footer {
            position: fixed; bottom: 1rem;
            font-size: 0.8rem; opacity: 0.5;
        }

        /* Setup screen */
        .setup {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .setup h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #eee; }
        .setup input {
            width: 100%; padding: 0.75rem; font-size: 1rem;
            border: 2px solid #444; border-radius: 8px;
            background: #222; color: #eee; text-align: center;
            margin-bottom: 0.75rem;
        }
        .setup button {
            padding: 0.75rem 2rem; font-size: 1rem;
            border: none; border-radius: 8px;
            background: #3498db; color: #fff; cursor: pointer;
        }
        .change-topic {
            position: fixed; top: 1rem; right: 1rem;
            background: none; border: none; font-size: 1.2rem;
            cursor: pointer; opacity: 0.4;
        }
        .lock-btn {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            background: rgba(0,0,0,0.25);
            color: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .lock-btn:active { transform: scale(0.95); }
        .lock-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="unknown">
    <div class="setup" id="setup">
        <h1>MacBook Status</h1>
        <p style="color:#aaa;margin-bottom:1rem;">Enter your ntfy topic to get started</p>
        <input type="text" id="topicInput" placeholder="your-ntfy-topic" autocapitalize="none" autocorrect="off">
        <br>
        <button onclick="saveTopic()">Connect</button>
    </div>

    <div class="card" id="card" style="display:none;">
        <div class="icon" id="icon">💻</div>
        <div class="status" id="statusText">Connecting...</div>
        <div class="time" id="timeText"></div>
        <div class="detail" id="detailText"></div>
        <button class="lock-btn" id="lockBtn" style="display:none;" onclick="sendLockCommand()">Lock Now</button>
    </div>

    <button class="change-topic" id="changeBtn" style="display:none;" onclick="changeTopic()">⚙️</button>

    <div class="footer">
        <span class="live-dot" id="liveDot" style="display:none;"></span>
        <span id="connText">connecting...</span>
    </div>

    <script>
        let evtSource = null;
        let currentTopic = null;

        async function sendLockCommand() {
            if (!currentTopic) return;
            const btn = document.getElementById('lockBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            try {
                await fetch(`https://ntfy.sh/${currentTopic}`, {
                    method: 'POST',
                    headers: { 'Title': 'Lock Command', 'Tags': 'cmd_lock' },
                    body: 'Remote lock requested'
                });
                btn.textContent = 'Lock sent';
            } catch (e) {
                btn.textContent = 'Failed - try again';
                btn.disabled = false;
            }
        }

        function saveTopic() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) return;
            localStorage.setItem('ntfy_topic', topic);
            start(topic);
        }

        function changeTopic() {
            localStorage.removeItem('ntfy_topic');
            if (evtSource) evtSource.close();
            document.getElementById('setup').style.display = '';
            document.getElementById('card').style.display = 'none';
            document.getElementById('changeBtn').style.display = 'none';
            document.body.className = 'unknown';
        }

        function start(topic) {
            currentTopic = topic;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('card').style.display = '';
            document.getElementById('changeBtn').style.display = '';
            fetchLatest(topic);
            connectSSE(topic);
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) fetchLatest(topic);
            });
        }

        async function fetchLatest(topic) {
            try {
                const resp = await fetch(`https://ntfy.sh/${topic}/json?poll=1&since=24h`);
                const text = await resp.text();
                const lines = text.trim().split('\n').filter(Boolean);
                for (let i = lines.length - 1; i >= 0; i--) {
                    const msg = JSON.parse(lines[i]);
                    if (msg.event === 'message') {
                        updateUI(msg);
                        break;
                    }
                }
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }

        function connectSSE(topic) {
            if (evtSource) evtSource.close();
            evtSource = new EventSource(`https://ntfy.sh/${topic}/sse`);
            evtSource.onopen = () => {
                document.getElementById('liveDot').style.display = 'inline-block';
                document.getElementById('connText').textContent = 'live';
            };
            evtSource.onerror = () => {
                document.getElementById('liveDot').style.display = 'none';
                document.getElementById('connText').textContent = 'reconnecting...';
            };
            evtSource.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.event === 'message') updateUI(msg);
                } catch (err) { /* ignore */ }
            };
        }

        function updateUI(msg) {
            const title = msg.title || '';
            let status = 'unknown';
            if (title.toLowerCase().includes('locked')) status = 'locked';
            if (title.toLowerCase().includes('unlocked')) status = 'unlocked';
            if (title.toLowerCase().includes('started')) status = 'started';

            const icons = { locked: '🔒', unlocked: '🔓', started: '🟢', unknown: '💻' };
            document.getElementById('icon').textContent = icons[status] || icons.unknown;
            document.getElementById('statusText').textContent = status;
            document.body.className = status;

            // Relative time
            if (msg.time) {
                const ago = relativeTime(msg.time);
                document.getElementById('timeText').textContent = ago;
            }
            document.getElementById('detailText').textContent = msg.message || '';

            // Show lock button only when unlocked
            const lockBtn = document.getElementById('lockBtn');
            if (status === 'unlocked') {
                lockBtn.style.display = '';
                lockBtn.disabled = false;
                lockBtn.textContent = 'Lock Now';
            } else {
                lockBtn.style.display = 'none';
            }
        }

        function relativeTime(unixSeconds) {
            const diff = Math.floor(Date.now() / 1000) - unixSeconds;
            if (diff < 5) return 'just now';
            if (diff < 60) return `${diff}s ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return `${Math.floor(diff / 86400)}d ago`;
        }

        // Update relative time every 10s
        setInterval(() => {
            // Re-display already shown time would need storing the timestamp;
            // the SSE/fetch will keep it fresh enough
        }, 10000);

        // Init
        const saved = localStorage.getItem('ntfy_topic');
        if (saved) {
            start(saved);
        }
    </script>
</body>
</html>
